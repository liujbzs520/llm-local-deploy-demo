events {
    worker_connections 1024;
}

http {
    # ─── Rate limiting zones ──────────────────────────────────────────────────
    limit_req_zone $http_authorization zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=30r/m;

    # ─── Logging ──────────────────────────────────────────────────────────────
    log_format api_log '$remote_addr - $http_authorization - [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time';

    access_log /var/log/nginx/access.log api_log;
    error_log  /var/log/nginx/error.log warn;

    # ─── Upstream ─────────────────────────────────────────────────────────────
    upstream open_webui {
        server open-webui:8080;
        keepalive 32;
    }

    upstream usage_tracker {
        server usage-tracker:8001;
    }

    # ─── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── Main HTTPS server ────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 50M;

        # ── OpenAI-compatible API endpoint ────────────────────────────────────
        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;

            # CORS headers for external clients
            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            proxy_pass         http://open_webui;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 300s;
        }

        # ── Usage / billing dashboard ─────────────────────────────────────────
        location /usage/ {
            proxy_pass http://usage_tracker/;
            proxy_set_header Host $host;
        }

        # ── Web UI ────────────────────────────────────────────────────────────
        location / {
            limit_req zone=ip_limit burst=10 nodelay;

            proxy_pass         http://open_webui;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 300s;
        }
    }
}
