version: "3.8"

services:
  # ─── Ollama: Local LLM Engine ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # GPU support (NVIDIA) — comment out if no GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Open WebUI: Chat Interface + API Gateway ───────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-please-set-in-env}
      - WEBUI_AUTH=true
      # Enable API key access for external clients
      - ENABLE_API_KEY=true
      # Rate limiting (tokens per minute per key)
      - API_KEY_RATE_LIMIT=${API_KEY_RATE_LIMIT:-60}
      - WEBUI_NAME=${WEBUI_NAME:-LLM API Service}
    depends_on:
      ollama:
        condition: service_healthy

  # ─── API Gateway / Reverse Proxy ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - open-webui

  # ─── Usage Tracker (lightweight analytics) ──────────────────────────────────
  usage-tracker:
    image: python:3.11-slim
    container_name: usage-tracker
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./scripts:/app
      - tracker_data:/app/data
    working_dir: /app
    command: >
      sh -c "pip install fastapi uvicorn httpx --quiet &&
             uvicorn usage_tracker:app --host 0.0.0.0 --port 8001"
    environment:
      - OPENWEBUI_URL=http://open-webui:8080
      - TRACKER_API_KEY=${TRACKER_API_KEY:-tracker-secret}

volumes:
  ollama_data:
  open_webui_data:
  nginx_logs:
  tracker_data:
